# Remote Code Configuration
# Copy this file to config.yaml and edit as needed.

machines:
  # Example: a GPU server accessible via SSH
  gpu-1:
    host: gpu1.example.com      # hostname or IP
    user: your-ssh-user         # SSH username
    # ssh_key: ~/.ssh/id_rsa    # Optional: path to SSH key (defaults to ssh-agent)
    # port: 22                  # SSH port (default: 22)
    # proxy_jump: gateway       # Optional: jump host (must also be defined as a machine)
    daemon_port: 9100           # Port for daemon RPC (default: 9100)
    # node_path: /usr/bin/node  # Optional: path to node on remote
    default_paths:              # Commonly used project paths (for reference)
      - /home/your-user/project-a
      - /home/your-user/project-b

  # Example: another server behind a jump host
  # gpu-2:
  #   host: gpu2.lab.internal
  #   user: your-ssh-user
  #   proxy_jump: gpu-1
  #   daemon_port: 9100

  # Example: localhost (head node itself, no SSH needed)
  # local:
  #   host: localhost             # auto-detected as localhost
  #   user: your-user
  #   daemon_port: 9200           # use different port to avoid conflicts
  #   node_path: /usr/bin/node
  #   default_paths:
  #     - /home/your-user/projects

bot:
  discord:
    token: ${DISCORD_TOKEN}     # Set via environment variable
    allowed_channels:           # Only respond in these channels (empty = all)
      # - 123456789012345678
    command_prefix: "/"
    admin_users:                # Discord user IDs allowed to use /restart, /update
      # - 123456789012345678

  telegram:
    token: ${TELEGRAM_TOKEN}    # Set via environment variable
    allowed_users:              # Only respond to these user IDs (empty = all)
      # - 123456789

# Default permission mode for new sessions
# auto = bypassPermissions (full auto, no confirmation needed)
# code = acceptEdits (auto accept file edits, confirm bash)
# plan = read-only analysis
# ask  = confirm everything
default_mode: auto

# Number of tool_use messages to batch into one message (default: 15)
# Set to 1 to disable batching (send each tool call as a separate message)
tool_batch_size: 15

skills:
  shared_dir: ./skills          # Local skills directory to sync to remotes
  sync_on_start: true           # Sync skills when /start creates a session

daemon:
  install_dir: ~/.remote-code/daemon  # Where daemon code lives on remote
  auto_deploy: true                     # Auto-deploy daemon code to remotes
  log_file: ~/.remote-code/daemon.log # Daemon log file on remote

# File transfer settings (Discord attachments -> remote machines)
file_pool:
  max_size: 1073741824              # Max pool size in bytes (default: 1GB)
  pool_dir: ~/.remote-code/file-pool  # Local file cache directory
  remote_dir: /tmp/remote-code/files  # Remote file staging directory
  allowed_types:                    # MIME type patterns for allowed files
    - text/plain
    - text/markdown
    - application/pdf
    - "image/*"
    - "video/*"
    - "audio/*"
