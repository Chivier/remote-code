name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-daemon:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: remote-code-daemon-linux-x64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: remote-code-daemon-windows-x64.exe
          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: remote-code-daemon-macos-arm64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/remote-code-daemon ${{ matrix.binary }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/remote-code-daemon.exe ${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  publish:
    needs: build-daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Place binaries into head/bin/
        run: |
          mkdir -p head/bin/
          cp artifacts/remote-code-daemon-linux-x64/remote-code-daemon-linux-x64 head/bin/
          cp artifacts/remote-code-daemon-windows-x64.exe/remote-code-daemon-windows-x64.exe head/bin/
          cp artifacts/remote-code-daemon-macos-arm64/remote-code-daemon-macos-arm64 head/bin/
          chmod +x head/bin/remote-code-daemon-*
          ls -la head/bin/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python package
        run: |
          pip install build
          python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            head/bin/remote-code-daemon-linux-x64
            head/bin/remote-code-daemon-windows-x64.exe
            head/bin/remote-code-daemon-macos-arm64
          generate_release_notes: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
