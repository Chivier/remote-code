name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          pip install -e ".[test]"
          python -m pytest tests/ --ignore=tests/integration -v --tb=short

  build-sdist:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - name: Verify sdist installs cleanly
        run: |
          pip install dist/codecast-*.tar.gz
          python -c "import head; print('sdist install OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Standalone daemon binaries for GitHub Release downloads
  build-daemon:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (musl static binaries — no glibc dependency) ──
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-22.04
            binary: codecast-daemon-linux-x64
            cross: false
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-22.04
            binary: codecast-daemon-linux-arm64
            cross: true
          # ── macOS ──
          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: codecast-daemon-macos-arm64
            cross: false
          - target: x86_64-apple-darwin
            runner: macos-latest
            binary: codecast-daemon-macos-x64
            cross: false
          # ── Windows ──
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: codecast-daemon-windows-x64.exe
            cross: false
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            binary: codecast-daemon-windows-arm64.exe
            cross: false

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # musl toolchain for static Linux binaries
      - name: Install musl tools (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      # Cross-compilation dependencies for Linux arm64 (musl)
      - name: Install cross-compilation tools (Linux arm64 musl)
        if: matrix.cross && matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          # Install aarch64 musl cross-compiler
          sudo mkdir -p /usr/local/aarch64-linux-musl
          curl -fsSL https://musl.cc/aarch64-linux-musl-cross.tgz | sudo tar xz -C /usr/local --strip-components=1
          echo '[target.aarch64-unknown-linux-musl]' >> ~/.cargo/config.toml
          echo 'linker = "/usr/local/bin/aarch64-linux-musl-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/codecast-daemon ${{ matrix.binary }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/codecast-daemon.exe ${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  github-release:
    needs: [build-sdist, build-daemon]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect daemon binaries
        run: |
          mkdir -p daemon-binaries/
          for dir in artifacts/codecast-daemon-*/; do
            cp "$dir"/* daemon-binaries/ 2>/dev/null || true
          done
          chmod +x daemon-binaries/codecast-daemon-* 2>/dev/null || true
          echo "Release artifacts:"
          ls -la daemon-binaries/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: daemon-binaries/*
          generate_release_notes: true

  pypi-publish:
    needs: [build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect dist files
        run: |
          mkdir -p dist/
          cp artifacts/sdist/*.tar.gz dist/
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
